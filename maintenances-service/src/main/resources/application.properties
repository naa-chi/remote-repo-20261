server.port = 7774
spring.application.name=maintenances-service

spring.datasource.url=jdbc:mysql://localhost:3306/transport_db_maintenancesservice?createDatabaseIfNotExists=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

logging.file.name=logs/maintenance.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n

spring.liquibase.change-log=db/changelog/db.changelog.sql
springdoc.override-with-generic-response=false

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

debug=true