spring.application.name=typeengine
server.port=7772

spring.datasource.url=jdbc:mysql://localhost:3306/transport_db_typeengine?createDatabaseIfNotExists=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Enable springdoc, but let it use the default path (/v3/api-docs)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
# REMOVED: springdoc.api-docs.path

# Fixed the log file name so it doesn't say typeengine.log
logging.file.name=logs/typeengine.log
logging.pattern.console=%d{HH:mm:ss} %-5level %msg%n
logging.pattern.file=%d{HH:mm:ss} %-5level %msg%n

spring.liquibase.change-log=db/changelog/db.changelog.sql