spring.application.name=api-gateway
server.port=8080

# Eureka client configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Optional: register the Gateway itself with Eureka (recommended)
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# The routes are now defined programmatically in ApiGatewayApplication.java
# Keep these for reference, or remove them:
# spring.cloud.gateway.routes[0].id=engine-route
# spring.cloud.gateway.routes[0].uri=http://localhost:7771
# ...

logging.level.org.springframework.cloud.gateway=DEBUG
management.endpoints.web.exposure.include=gateway