          #   PORT : 7770
          #   PATH : /api/manufacturers
          #   DOCS : /api/manufacturer/v3/api-docs
          # ============================================================================
          - id: manufacturer-docs
            uri: http://localhost:7770
            predicates:
              - Path=/api/manufacturer/v3/api-docs
            filters:
              - RewritePath=/api/manufacturer/(?<segment>.*), /${segment}
          - id: manufacturer-api-exact
            uri: http://localhost:7770
